<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Deutsch lernen</title>
<link rel="manifest" href="manifest.webmanifest?v=33">
<meta name="theme-color" content="#0f141b">
<link rel="icon" href="icon.svg?v=33" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg?v=33">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<style>
:root{
  --bg1:#0e1729; --bg2:#0a1120; --card1:#1a2740; --card2:#131c30;
  --ink:#eef3fb; --ink2:#c4d2ec; --muted:#8a9bc0; --faint:#5a6b8c;
  --blue:#2563d4; --blue2:#4a9bff; --green:#3ddc97; --gold:#ffb84d;
  --line:rgba(255,255,255,.07);
  --su:0 14px 34px rgba(0,0,0,.5); --sm:0 4px 12px rgba(0,0,0,.3);
  --hi:inset 0 1px 0 rgba(255,255,255,.1);
  --r:22px;
}
[data-theme="light"]{
  --bg1:#eef3fb; --bg2:#e3ebf7; --card1:#ffffff; --card2:#f4f8fd;
  --ink:#1a2740; --ink2:#3a4a68; --muted:#5a6b86; --faint:#9aa8c0;
  --blue:#2563d4; --blue2:#4a9bff; --green:#1f9d6b; --gold:#c9912b;
  --line:rgba(20,40,80,.08);
  --su:0 14px 34px rgba(20,40,80,.14); --sm:0 4px 12px rgba(20,40,80,.1);
  --hi:inset 0 1px 0 #fff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  background:radial-gradient(120% 80% at 50% 0%, var(--bg1) 0%, var(--bg2) 75%);
  color:var(--ink);min-height:100dvh;transition:background .3s}
.app{max-width:440px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;
  padding:env(safe-area-inset-top) 0 0}

/* top bar */
.top{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.1rem .3rem;gap:.5rem}
.top .left{display:flex;gap:.45rem;align-items:center}
.ic{width:40px;height:40px;border:none;border-radius:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,var(--card1),var(--card2));box-shadow:var(--sm),var(--hi);color:var(--ink2);transition:transform .12s}
.ic:active{transform:scale(.9)}
.ic svg{width:19px;height:19px}
.streak{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:999px;font-weight:700;font-size:14px;
  background:linear-gradient(145deg,var(--gold),#e8941e);color:#3a2200;box-shadow:var(--sm)}
.crumb{font-size:13px;color:var(--muted);font-weight:700}

/* progress */
.pbar{height:5px;margin:.5rem 1.1rem .1rem;background:var(--line);border-radius:4px;overflow:hidden}
.pbar b{display:block;height:100%;width:0;border-radius:4px;background:linear-gradient(90deg,var(--blue2),var(--blue));transition:width .4s}

/* selection pills (only visible when studying) */
.pills{display:flex;gap:9px;padding:.4rem 1.1rem .1rem}
.pill{flex:1;border:none;border-radius:13px;padding:.6rem;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink2);
  background:linear-gradient(145deg,var(--card1),var(--card2));box-shadow:var(--sm),var(--hi);
  display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .12s}
.pill:active{transform:scale(.97)}
.pill svg{width:15px;height:15px;opacity:.8}

/* scroll area */
.scroll{flex:1;overflow-y:auto;padding:.5rem 1.1rem 1rem;-webkit-overflow-scrolling:touch}

/* the universal card */
.card{background:linear-gradient(165deg,var(--card1),var(--card2));border-radius:var(--r);
  box-shadow:var(--su),var(--hi);border:1px solid var(--line);overflow:hidden;
  transition:transform .45s cubic-bezier(.4,.2,.2,1),opacity .35s}
.card.swap{opacity:0;transform:translateY(10px) scale(.985)}
.cardPad{padding:1.4rem 1.2rem}

/* ===== SELECTION MODE ===== */
.selHead{text-align:center;margin-bottom:1.1rem}
.selStep{font-size:10px;letter-spacing:.14em;color:var(--blue2);font-weight:800;margin:0 0 .4rem}
.selTitle{font-size:21px;font-weight:700;color:var(--ink);margin:0}
.selSub{font-size:13px;color:var(--muted);margin:.3rem 0 0}
.grid{display:grid;gap:9px}
.grid.two{grid-template-columns:1fr 1fr}
.grid.one{grid-template-columns:1fr}
.opt{border:1px solid var(--line);border-radius:14px;padding:.85rem;cursor:pointer;color:var(--ink2);font-weight:700;font-size:14px;
  background:linear-gradient(160deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
  display:flex;align-items:center;gap:9px;transition:transform .12s,border-color .15s,background .15s;text-align:left;min-height:52px}
[data-theme="light"] .opt{background:linear-gradient(160deg,#fff,#f0f5fc)}
.opt:active{transform:scale(.98)}
.opt:hover{border-color:rgba(74,155,255,.4)}
.opt .fl{font-size:20px;flex:0 0 auto}
.opt .fl .flag{display:block;border-radius:3px;box-shadow:0 0 0 1px rgba(255,255,255,.15)}
.grid.two .wideOpt{grid-column:1 / -1}
.opt.center{justify-content:center;text-align:center}
.opt.section{grid-column:1/-1;background:none;border:none;box-shadow:none;color:var(--blue2);font-size:11px;
  letter-spacing:.06em;padding:.5rem 0 .1rem;min-height:0;cursor:default;font-weight:800}
.selBack{background:none;border:none;color:var(--blue2);font-weight:700;font-size:13px;cursor:pointer;padding:.2rem 0;margin-bottom:.6rem;display:inline-flex;align-items:center;gap:5px}

/* ===== STUDY MODE (card content) ===== */
.badges{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
.lc{display:flex;align-items:center;gap:5px;background:rgba(74,155,255,.16);padding:5px 11px;border-radius:999px;
  font-size:12px;font-weight:800;color:var(--blue2)}
.lc svg{width:13px;height:13px}
.ring{width:42px;height:42px;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--green)}
.eyebrow{font-size:10px;color:var(--faint);letter-spacing:.13em;font-weight:800;text-align:center;margin:.7rem 0 .35rem}
.word{font-size:clamp(22px,7vw,33px);text-align:center;font-weight:800;color:var(--ink);margin:.1rem 0;line-height:1.15;overflow-wrap:anywhere;word-break:break-word;hyphens:auto;max-width:100%}
.panel{margin-top:.85rem;border-radius:15px;padding:.7rem .85rem}
.panel .lab{font-size:10px;letter-spacing:.06em;font-weight:800;margin:0 0 .3rem;display:flex;justify-content:space-between;align-items:center}
.panel p{margin:0;font-size:14px;line-height:1.5}
.forms{background:linear-gradient(160deg,rgba(140,114,200,.14),rgba(140,114,200,.06))}
.forms .lab{color:#a98fd6}
.forms.noun{background:linear-gradient(160deg,rgba(200,140,70,.14),rgba(200,140,70,.05))}
.forms.noun .lab{color:#cda06a}
.lvl{font-size:9px;font-weight:800;color:#c4a8f0;background:rgba(140,114,200,.2);padding:2px 8px;border-radius:999px}
.fGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:.2rem}
.fItem{background:rgba(255,255,255,.05);border-radius:9px;padding:.4rem .6rem}
[data-theme="light"] .fItem{background:rgba(255,255,255,.6)}
.fItem.wide{grid-column:1/-1}.fItem.active{outline:2px solid rgba(74,155,255,.5);background:rgba(74,155,255,.1)}
.fItem dt{font-size:9px;color:var(--faint);font-weight:800;margin:0}
.fItem dd{font-size:14px;color:var(--ink2);font-weight:700;margin:.1rem 0 0}
.syn{background:linear-gradient(160deg,rgba(74,155,255,.1),rgba(74,155,255,.03))}
.syn .lab{color:#7fa8e0}.syn p{color:var(--ink2);font-weight:600}
.ex{background:linear-gradient(160deg,rgba(61,220,151,.12),rgba(61,220,151,.04))}
.ex .lab{color:#5fc99a}.ex p{color:var(--ink)}.ex b{color:var(--green)}
.ex .exTr{color:var(--muted);font-size:13px;margin-top:.35rem;font-style:italic}
[dir="rtl"] .ex .exTr{text-align:right}
.trans{background:linear-gradient(160deg,rgba(74,155,255,.12),rgba(74,155,255,.04));border:1.5px solid rgba(74,155,255,.18);transition:border-color .3s,box-shadow .3s}
.trans.speaking{border-color:rgba(74,155,255,.6);box-shadow:0 0 0 3px rgba(74,155,255,.12)}
.trans .lab{color:#7fa8e0}
.trans .main{font-size:17px;font-weight:700;color:#9fc2ff;margin:.3rem 0 0}
.trans .transEx{font-size:14px;color:#cfe0fb;margin:.4rem 0 0;line-height:1.45}
[dir="rtl"] .trans .transEx{text-align:right}
.trans .sub{font-size:13px;color:var(--muted);margin:.2rem 0 0}
.live{display:none;align-items:center;gap:4px;font-size:10px;color:var(--blue2);font-weight:800}
.trans.speaking .live{display:flex}
.live .dot{width:6px;height:6px;border-radius:50%;background:var(--blue2);box-shadow:0 0 6px var(--blue2);animation:pl 1s infinite}
@keyframes pl{0%,100%{opacity:.35}50%{opacity:1}}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:.9rem}
.sb{min-height:48px;border:none;border-radius:14px;cursor:pointer;font-size:14px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:6px;color:var(--ink2);
  background:linear-gradient(160deg,var(--card1),var(--card2));box-shadow:var(--sm),var(--hi);transition:transform .12s}
.sb:active{transform:translateY(1px) scale(.99)}
.sb.on{background:linear-gradient(160deg,var(--green),#1f7a52);color:#eafff5}
.sb svg{width:16px;height:16px}

/* player */
.player{position:sticky;bottom:0;margin:.5rem 1.1rem calc(.7rem + env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:11px;padding:.6rem .8rem;border-radius:20px;
  background:linear-gradient(160deg,var(--card1),var(--card2));box-shadow:var(--su),var(--hi)}
.pbtn{width:42px;height:42px;border:none;border-radius:50%;cursor:pointer;color:var(--ink2);flex:0 0 auto;
  background:linear-gradient(145deg,var(--card1),var(--card2));box-shadow:var(--sm),var(--hi);
  display:flex;align-items:center;justify-content:center;transition:transform .12s}
.pbtn:active{transform:scale(.9)}
.pbtn svg{width:19px;height:19px}
.pbtn.main{width:56px;height:56px;color:#fff;background:linear-gradient(145deg,var(--blue2),var(--blue));
  box-shadow:0 8px 22px rgba(40,100,220,.5),inset 0 2px 0 rgba(255,255,255,.4),inset 0 -3px 6px rgba(0,0,0,.2)}
.pbtn.main svg{width:26px;height:26px}
.pmeta{flex:1;min-width:0}
.pmeta .t{font-size:13px;font-weight:800;color:var(--ink)}
.pmeta .s{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* tabbar */
.tabs{display:flex;margin:0 1.1rem calc(.7rem + env(safe-area-inset-bottom));
  background:linear-gradient(160deg,var(--card1),var(--card2));border-radius:18px;padding:.4rem .3rem;box-shadow:var(--su),var(--hi)}
.tab{flex:1;border:none;background:none;cursor:pointer;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:.4rem;border-radius:12px;font-size:10px;font-weight:700;transition:color .15s}
.tab svg{width:20px;height:20px}
.tab.on{color:var(--blue2)}

/* drawer + scrim + sheet */
.scrim{position:fixed;inset:0;background:rgba(5,10,20,.55);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100dvh;width:min(86vw,360px);z-index:50;overflow-y:auto;
  background:linear-gradient(165deg,var(--bg1),var(--bg2));box-shadow:-16px 0 44px rgba(0,0,0,.5);
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,.2,.2,1);padding:env(safe-area-inset-top) 1.1rem 1.1rem}
.drawer.open{transform:translateX(0)}
[dir="rtl"] .drawer{left:0;right:auto;transform:translateX(-100%)}
[dir="rtl"] .drawer.open{transform:translateX(0)}
.dHead{display:flex;justify-content:space-between;align-items:center;padding:1rem 0 .8rem}
.dHead strong{font-size:18px}
.grp{margin-bottom:1.2rem}
.grp h4{font-size:11px;letter-spacing:.06em;color:var(--faint);font-weight:800;margin:0 0 .5rem}
.oRow{background:linear-gradient(160deg,var(--card1),var(--card2));border-radius:13px;padding:.7rem .85rem;margin-bottom:8px;
  box-shadow:var(--sm),var(--hi);display:flex;justify-content:space-between;align-items:center;gap:10px}
.oRow label{font-size:14px;font-weight:700;color:var(--ink2)}
.oRow select{border:none;border-radius:9px;padding:.4rem .6rem;font-size:13px;font-weight:700;
  background:rgba(255,255,255,.08);color:var(--ink);appearance:none;-webkit-appearance:none}
.oRow select option{background:#1a2740;color:#eef3fb}
[data-theme="light"] .oRow select{background:rgba(20,40,80,.06)}
[data-theme="light"] .oRow select option{background:#fff;color:#1a2740}
.oRow input[type=range]{flex:1;min-width:0}
.oRow output{font-size:13px;font-weight:800;color:var(--blue2);min-width:46px;text-align:right}
.seg{display:flex;gap:6px;width:100%}
.seg button{flex:1;border:none;border-radius:10px;padding:.55rem;font-size:12px;font-weight:800;cursor:pointer;
  background:rgba(255,255,255,.08);color:var(--ink2)}
[data-theme="light"] .seg button{background:rgba(20,40,80,.06)}
.seg button.on{background:linear-gradient(145deg,var(--blue2),var(--blue));color:#fff}

/* panel views */
.pv{position:fixed;inset:0;max-width:440px;margin:0 auto;z-index:35;overflow-y:auto;
  background:radial-gradient(120% 80% at 50% 0%,var(--bg1),var(--bg2));padding:1.2rem 1.1rem calc(5rem + env(safe-area-inset-bottom))}
.pvH{display:flex;align-items:center;gap:.5rem;padding:.5rem 0 1rem}
.pvH strong{font-size:22px}
.pvBack{background:none;border:none;color:var(--blue2);font-weight:800;font-size:15px;cursor:pointer;padding:0}
.stat{background:linear-gradient(160deg,var(--card1),var(--card2));border-radius:16px;padding:1rem;margin-bottom:11px;box-shadow:var(--sm),var(--hi)}
.statRow{display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--line)}
.statRow:last-child{border:none}.statRow b{color:var(--blue2)}
.big{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}
.bigC{background:linear-gradient(160deg,var(--card1),var(--card2));border-radius:16px;padding:1rem;text-align:center;box-shadow:var(--sm),var(--hi)}
.bigC .n{font-size:28px;font-weight:800}.bigC .l{font-size:12px;color:var(--muted);margin-top:3px}
.voice{font-size:11px;color:var(--faint);text-align:center;margin:.6rem 1.1rem 0}
.stamp{text-align:center;font-size:10px;color:var(--faint);opacity:.55;margin:.3rem 0 0}
[dir="rtl"] .opt,[dir="rtl"] .panel,[dir="rtl"] .pmeta{text-align:right}
[dir="rtl"] .word,[dir="rtl"] .eyebrow{text-align:center}
.word.longword{font-size:clamp(18px,5.2vw,26px);letter-spacing:-.3px}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="left">
      <button class="ic" id="menuBtn" aria-label="Optionen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <button class="ic" id="progBtn" aria-label="Fortschritt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 4-5"/></svg></button>
      <button class="ic" id="themeBtn" aria-label="Design"></button>
    </div>
    <span class="streak"><span id="streakFire">🔥</span><span id="streak">1</span></span>
  </div>
  <div class="pbar"><b id="bar"></b></div>

  <!-- selection pills: shown only in study mode -->
  <div class="pills" id="pills" style="display:none">
    <button class="pill" id="pillLang"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18a15 15 0 0 1 0-18"/></svg><span id="pillLangLabel">—</span></button>
    <button class="pill" id="pillLevel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/></svg><span id="pillLevelLabel">—</span></button>
  </div>

  <div class="scroll">
    <div class="card" id="card"><div class="cardPad" id="cardPad"></div></div>
    <p class="voice" id="voiceStatus"></p>
    <p class="stamp">Build v33 · 7 Sprachen · Audio</p>
  </div>

  <div class="player" id="player" style="display:none">
    <button class="pbtn" id="prev" aria-label="Zurück"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zM20 6v12l-9-6z"/></svg></button>
    <button class="pbtn main" id="toggle" aria-label="Play"><svg id="toggleIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
    <button class="pbtn" id="next" aria-label="Weiter"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM4 6l9 6-9 6z"/></svg></button>
    <div class="pmeta"><div class="t" id="pmTitle">—</div><div class="s" id="pmSub">—</div></div>
  </div>

  <nav class="tabs" id="tabs" style="display:none">
    <button class="tab on" data-tab="learn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M4 5h7v15H4zM13 5h7v15h-7z"/></svg><span id="tabLearn">Lernen</span></button>
    <button class="tab" data-tab="progress"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 4-5"/></svg><span id="tabProgress">Fortschritt</span></button>
    <button class="tab" data-tab="marked"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M6 3h12v18l-6-4-6 4z"/></svg><span id="tabMarked">Markiert</span></button>
    <button class="tab" data-tab="options"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6a7 7 0 0 0 .1-1z"/></svg><span id="tabOptions">Optionen</span></button>
  </nav>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="dHead"><strong id="optTitle">Optionen</strong><button class="ic" id="drawerClose" aria-label="Schließen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
  <div class="grp">
    <h4 id="grpPlayback">WIEDERGABE</h4>
    <div class="oRow" style="flex-direction:column;align-items:stretch">
      <div class="seg" id="repeatSeg"><button data-mode="list" class="on" id="segList">Liste endlos</button><button data-mode="card" id="segCard">Karte wdh.</button><button data-mode="once" id="segOnce">Einmal</button></div>
    </div>
    <div class="oRow"><label id="lblTempo">Tempo</label><input type="range" id="rate" min="60" max="120" step="5" value="100"><output id="rateOut">100%</output></div>
    <div class="oRow"><label id="lblPause">Pause</label><input type="range" id="gap" min="200" max="2500" step="100" value="500"><output id="gapOut">0,5s</output></div>
  </div>
  <div class="grp">
    <h4 id="grpAppearance">DARSTELLUNG</h4>
    <div class="oRow"><label id="lblUILang">App-Sprache</label>
      <select id="uiLangSel"><option value="auto" id="optAutoUI">Wie Übersetzung</option><option value="de">Deutsch</option><option value="en">English</option><option value="fa">فارسی</option><option value="ar">العربية</option><option value="es">Español</option><option value="ru">Русский</option><option value="uk">Українська</option><option value="tr">Türkçe</option></select></div>
    <div class="oRow"><label id="lblDesign">Design</label>
      <div class="seg" id="themeSeg" style="max-width:160px"><button data-t="light" id="segLight">Hell</button><button data-t="dark" id="segDark">Dunkel</button></div></div>

  html+='<div class="ring"><svg width="42" height="42"><circle cx="21" cy="21" r="17" fill="none" stroke="var(--line)" stroke-width="3"/><circle id="ringfg" cx="21" cy="21" r="17" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round" stroke-dasharray="107" stroke-dashoffset="'+(107-107*pct/100)+'"/></svg><span class="pct">'+pct+'</span></div>';
  html+='<div class="lc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 14v-2a9 9 0 0 1 18 0v2"/><path d="M3 14a2 2 0 0 1 2-2h1v6H5a2 2 0 0 1-2-2zM21 14a2 2 0 0 0-2-2h-1v6h1a2 2 0 0 0 2-2z"/></svg>×'+n+'</div>';
  html+='</div>';
  html+='<p class="eyebrow">'+t('germanWord')+'</p>';
  html+='<h2 class="word'+((c.word||'').length>22?' longword':'')+'">'+esc(c.word)+'</h2>';
  // forms
  if(c.cat==='verb'){
    var items=verbFormItems(c);
    html+='<div class="panel forms"><p class="lab"><span>'+t('verbForms')+'</span><span class="lvl">'+(c.irregular?'⚡ ':'')+(c.level||'B2')+'</span></p><div class="fGrid">';
    items.forEach(function(it,i){ html+='<div class="fItem'+(it.wide?' wide':'')+'" data-fi="'+i+'"><dt>'+esc(it.label)+'</dt><dd>'+esc(it.value||'—')+'</dd></div>'; });
    html+='</div></div>';
  } else if(c.cat==='noun'){
    html+='<div class="panel forms noun"><p class="lab"><span>'+t('nounForms')+'</span></p><div class="fGrid">';
    html+='<div class="fItem"><dt>'+t('fArticle')+'</dt><dd>'+esc(c.article||'—')+'</dd></div>';
    html+='<div class="fItem"><dt>'+t('fSingular')+'</dt><dd>'+esc(c.singular||'—')+'</dd></div>';
    html+='<div class="fItem wide"><dt>'+t('fPlural')+'</dt><dd>'+esc(c.plural||'—')+'</dd></div>';
    html+='</div></div>';
  }
  // synonyms
  if(c.syn){
    var sc=c.syn.split('·').filter(function(s){return s.trim()}).length;
    html+='<div class="panel syn"><p class="lab"><span>'+t('synonyms')+(c.cat==='verb'?' · '+sc:'')+'</span></p><p>'+esc(c.syn)+'</p></div>';
  }
  // example
  if(c.ex && (c.ex[0]||c.ex[1])){
    var exTr=(c._exampleTrans&&c._exampleTrans[langToDataKey(LANG.code)])||'';
    html+='<div class="panel ex"><p class="lab"><span>'+t('example')+'</span></p><p>'+esc(c.ex[0])+'<b>'+esc(c.ex[1])+'</b>'+esc(c.ex[2]||'')+'</p>';
    if(exTr)html+='<p class="exTr">'+esc(exTr)+'</p>';
    html+='</div>';
  }
  // translation (word translation only — example translation shows under EXAMPLE)
  var tr=resolveTrans(c);
  html+='<div class="panel trans" id="trans"><p class="lab"><span>'+t('translation')+'</span><span class="live"><span class="dot"></span>'+t('speaking')+'</span></p>';
  html+='<p class="main">'+esc(tr.main||'—')+'</p>';
  html+='</div>';
  // actions
  html+='<div class="row2"><button class="sb" id="flipBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>'+t('flip')+'</button>';
  html+='<button class="sb'+((master[c.id]||pct>=100)?' on':'')+'" id="masterBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>'+t('mastered')+'</button></div>';
  $('cardPad').innerHTML=html;
  $('flipBtn').onclick=function(){var card=$('card');card.style.transform='rotateY(6deg) scale(.99)';setTimeout(function(){card.style.transform=''},400);var r=resolveTrans(CARDS[pos]);speak(r.main||'',LANG.code)};
  $('masterBtn').onclick=function(){var id=CARDS[pos].id;master[id]=!master[id];wr(LS.master,master);renderStudy()};
  $('bar').style.width=((pos+1)/CARDS.length*100)+'%';
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]})}

/* ============ playback ============ */
function bumpListen(){var c=CARDS[pos];listen[c.id]=(listen[c.id]||0)+1;wr(LS.listen,listen);
  var fg=$('ringfg');if(fg){var n=listen[c.id],pct=Math.min(100,Math.round(n/MASTER_AT*100));fg.style.strokeDashoffset=(107-107*pct/100);
  var pe=document.querySelector('.ring .pct');if(pe)pe.textContent=pct;var lce=document.querySelector('.lc');if(lce)lce.innerHTML=lce.innerHTML.replace(/×\d+/,'×'+n)}}
async function playOne(myToken){
  var c=CARDS[pos];
  await new Promise(function(res){speak(c.word,'de-DE',res)}); if(myToken!==token)return;
  bumpListen(); await sleep(150); if(myToken!==token)return;
  if(c.cat==='verb'){
    var items=verbFormItems(c);
    for(var i=0;i<items.length;i++){
      if(myToken!==token)return;
      var val=items[i].value; if(!val||!String(val).trim())continue;
      var el=document.querySelector('.fItem[data-fi="'+i+'"]'); if(el)el.classList.add('active');
      await new Promise(function(res){speak(val,'de-DE',res)});
      if(el)el.classList.remove('active'); await sleep(120); if(myToken!==token)return;
    }
  }
  // German example sentence
  if(c.ex&&c.ex.join('').trim()){ await new Promise(function(res){speak(c.ex.join(''),'de-DE',res)}); if(myToken!==token)return; }
  await sleep(200); if(myToken!==token)return;
  // translation turn: word translation, then example translation, in the selected language
  var tr=resolveTrans(c);
  var exTr=(c._exampleTrans&&c._exampleTrans[langToDataKey(LANG.code)])||'';
  var trEl=$('trans'); if(trEl)trEl.classList.add('speaking');
  if(tr.main&&String(tr.main).trim()){ await new Promise(function(res){speak(tr.main,LANG.code,res)}); if(myToken!==token){if(trEl)trEl.classList.remove('speaking');return} }
  if(exTr&&String(exTr).trim()){ await sleep(120); if(myToken!==token){if(trEl)trEl.classList.remove('speaking');return} await new Promise(function(res){speak(exTr,LANG.code,res)}); }
  if(trEl)trEl.classList.remove('speaking');
}
async function loop(){
  playing=true; var myToken=++token; setToggle(); acquireWakeLock();
  while(playing&&myToken===token){
    await playOne(myToken); if(!playing||myToken!==token)break;
    await sleep(gapMs); if(!playing||myToken!==token)break;
    if(repeatMode==='card'){renderStudy();continue}
    if(repeatMode==='once'&&pos===CARDS.length-1){stop();break}
    pos=(pos+1)%CARDS.length; renderStudy();
  }
}
function stop(){playing=false;token++;setToggle();if('speechSynthesis'in window)speechSynthesis.cancel();if(window.__curAudio){try{window.__curAudio.pause()}catch(_){}}releaseWakeLock();var tr=$('trans');if(tr)tr.classList.remove('speaking')}
function setToggle(){$('toggleIcon').innerHTML=playing?'<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>':'<path d="M8 5v14l11-7z"/>'}
$('toggle').onclick=function(){playing?stop():loop()};
$('next').onclick=function(){stop();pos=(pos+1)%CARDS.length;renderStudy()};
$('prev').onclick=function(){stop();pos=(pos-1+CARDS.length)%CARDS.length;renderStudy()};

/* ============ selection click handling (event delegation on card) ============ */
$('cardPad').addEventListener('click',function(e){
  var b=e.target.closest('button'); if(!b)return;
  if(b.dataset.lang){
    LANG.code=b.dataset.lang; LANG.label=b.dataset.label;
    if(UILANG_MODE==='auto'){UILANG=uiKeyFor(LANG.code);applyUILang()}
    showVoice(); swapCard(renderSelectMaterial); return;
  }
  if(b.dataset.material){ currentMaterial=b.dataset.material; swapCard(renderSelectLevel); return; }
  if(b.dataset.list){ currentList=b.dataset.list; swapCard(function(){renderSelectUnit(currentList)}); return; }
  if(b.dataset.unit){ enterStudy(currentList, b.dataset.unit==='all'?null:parseInt(b.dataset.unit,10)); return; }
});
function enterStudy(list,unit){
  currentList=list; currentUnit=(unit==null?null:unit);
  var real=loadRealCards(list);
  if(currentUnit!=null){ real=real.filter(function(c){return unitNum(c)===currentUnit}); }
  CARDS=real.length?real:[];
  pos=0; playing=false;
  wr(LS.resume,{lang:LANG.code,label:LANG.label,list:currentList,material:currentMaterial,unit:currentUnit});
  $('pmTitle').textContent=t('autoloop');
  $('pmSub').textContent='DE → '+LANG.label+' · '+t('running');
  swapCard(renderStudy);
  try{if('speechSynthesis'in window){var u=new SpeechSynthesisUtterance(' ');u.volume=0;speechSynthesis.speak(u)}}catch(_){}
}

/* pills reopen selection */
$('pillLang').onclick=function(){stop();swapCard(renderSelectLang)};
$('pillLevel').onclick=function(){stop();swapCard(renderSelectLevel)};

/* ============ drawer ============ */
function openDrawer(){$('drawer').classList.add('open');$('scrim').classList.add('open')}
function closeDrawer(){$('drawer').classList.remove('open');$('scrim').classList.remove('open')}
$('menuBtn').onclick=openDrawer; $('drawerClose').onclick=closeDrawer; $('scrim').onclick=closeDrawer;
$('restart').onclick=function(){closeDrawer();stop();swapCard(renderSelectLang)};
$('repeatSeg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;repeatMode=b.dataset.mode;
  document.querySelectorAll('#repeatSeg button').forEach(function(x){x.classList.toggle('on',x===b)})});
$('rate').oninput=function(){rateMul=this.value/100;$('rateOut').textContent=this.value+'%'};
$('gap').oninput=function(){gapMs=+this.value;$('gapOut').textContent=(gapMs/1000).toFixed(1).replace('.',',')+'s'};
$('uiLangSel').onchange=function(){UILANG_MODE=this.value;UILANG=(this.value==='auto')?uiKeyFor(LANG.code):this.value;applyUILang();wr(LS.uilang,{mode:UILANG_MODE})};
$('themeSeg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;applyTheme(b.dataset.t)});

/* ============ tabs + panels ============ */
$('tabs').addEventListener('click',function(e){var b=e.target.closest('.tab');if(!b)return;var n=b.dataset.tab;
  if(n==='options'){openDrawer();return}
  document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('on',x.dataset.tab===n)});
  $('progressView').style.display=n==='progress'?'':'none';
  $('markedView').style.display=n==='marked'?'':'none';
  if(n==='progress')renderProgress(); if(n==='marked')renderMarked();
});
document.querySelectorAll('.pvBack').forEach(function(b){b.onclick=function(){
  $('progressView').style.display='none';$('markedView').style.display='none';
  document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('on',x.dataset.tab==='learn')});
}});
function renderProgress(){
  var total=Object.values(listen).reduce(function(a,b){return a+b},0);
  var mastered=Object.keys(master).filter(function(k){return master[k]}).length;
  var inProg=Object.keys(listen).filter(function(k){return !master[k]}).length;
  var top=Object.entries(listen).sort(function(a,b){return b[1]-a[1]}).slice(0,5).map(function(e){
    var c=CARDS.find(function(x){return x.id===e[0]});return '<div class="statRow"><span>'+esc(c?c.word:e[0])+'</span><b>×'+e[1]+'</b></div>'}).join('')||'<div class="statRow"><span>'+t('nothingHeard')+'</span></div>';
  $('progressBody').innerHTML='<div class="big"><div class="bigC"><div class="n" style="color:var(--green)">'+mastered+'</div><div class="l">'+t('masteredN')+'</div></div><div class="bigC"><div class="n" style="color:var(--gold)">'+inProg+'</div><div class="l">'+t('inProgress')+'</div></div></div><div class="stat"><div class="statRow"><span>'+t('totalHeard')+'</span><b>'+total+'</b></div><div class="statRow"><span>'+t('streak')+'</span><b>'+(rd(LS.streak,1)||1)+' '+t('days')+'</b></div></div><div class="stat"><h4 style="margin:0 0 .5rem;color:var(--faint);font-size:11px">'+t('topHeard')+'</h4>'+top+'</div>';
}
function renderMarked(){
  var ids=Object.keys(master).filter(function(k){return master[k]});
  $('markedBody').innerHTML=ids.length?'<div class="stat">'+ids.map(function(id){var c=CARDS.find(function(x){return x.id===id});return '<div class="statRow"><span>'+esc(c?c.word:id)+'</span><span style="color:var(--green)">✓</span></div>'}).join('')+'</div>':'<div class="stat"><div class="statRow"><span>'+t('noMarked')+'</span></div></div>';
}

/* ============ theme + i18n ============ */
function applyTheme(th){document.documentElement.setAttribute('data-theme',th);wr(LS.theme,th);
  $('themeBtn').innerHTML=th==='dark'?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 4l1.5 1.5M18.5 18.5L20 20M2 12h2M20 12h2M4 20l1.5-1.5M18.5 5.5L20 4"/></svg>':'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
  document.querySelectorAll('#themeSeg button').forEach(function(x){x.classList.toggle('on',x.dataset.t===th)})}
$('themeBtn').onclick=function(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')};

function setTxt(id,v){var e=$(id);if(e)e.textContent=v}
function applyUILang(){
  document.documentElement.setAttribute('dir',isRTL()?'rtl':'ltr');
  document.documentElement.setAttribute('lang',UILANG);
  setTxt('tabLearn',t('tabLearn'));setTxt('tabProgress',t('tabProgress'));setTxt('tabMarked',t('tabMarked'));setTxt('tabOptions',t('tabOptions'));
  setTxt('optTitle',t('options'));setTxt('grpPlayback',t('playback'));setTxt('lblTempo',t('tempo'));setTxt('lblPause',t('pauseCards'));
  setTxt('grpAppearance',t('appearance'));setTxt('lblUILang',t('uiLangLabel'));setTxt('lblDesign',t('design'));
  setTxt('optAutoUI',t('autoUI'));
  setTxt('segLight',t('light'));setTxt('segDark',t('dark'));setTxt('segList',t('listEndless'));setTxt('segCard',t('repeatCard'));setTxt('segOnce',t('once'));
  setTxt('progressTitle',t('progress'));setTxt('markedTitle',t('markedWords'));setTxt('restartLabel',t('restart'));
  if(MODE==='study'){$('pmTitle').textContent=t('autoloop');$('pmSub').textContent='DE → '+LANG.label+' · '+t('running');renderStudy()}
  else if(MODE==='select-lang')renderSelectLang();
  else if(MODE==='select-material')renderSelectMaterial();
  else if(MODE==='select-level')renderSelectLevel();
  else if(MODE==='select-unit')renderSelectUnit(currentList);
  showVoice();
}

/* ============ boot ============ */
applyTheme(rd(LS.theme,(window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light'));
(function(){
  var r=rd(LS.resume,null);
  if(r&&r.lang){
    LANG.code=r.lang;LANG.label=r.label;currentList=r.list||'B2 all 12 units';currentMaterial=r.material;currentUnit=(r.unit==null?null:r.unit);
    if(UILANG_MODE==='auto')UILANG=uiKeyFor(LANG.code);
    applyUILang();
    var real=loadRealCards(currentList);
    if(currentUnit!=null){real=real.filter(function(c){return unitNum(c)===currentUnit})}
    CARDS=real.length?real:[];pos=0;
    $('pmTitle').textContent=t('autoloop');$('pmSub').textContent='DE → '+LANG.label+' · '+t('running');
    renderStudy();
  } else {
    applyUILang(); renderSelectLang();
  }
})();
setTimeout(showVoice,800);
/* mobile speech reliability: unlock on first user gesture, and keep the queue
   alive (mobile browsers pause speechSynthesis after ~15s) */
(function(){
  var unlocked=false;
  function unlock(){ if(unlocked)return; unlocked=true;
    try{if('speechSynthesis'in window){
      loadVoices();
      // Prime with the actual translation-language voice (e.g. English) so the FIRST
      // real word isn't rendered by a cold engine / default cartoon voice.
      var tv=(typeof pickVoice==='function'&&LANG&&LANG.code)?pickVoice(LANG.code):null;
      var u=new SpeechSynthesisUtterance(' ');u.volume=0;if(tv){u.voice=tv;u.lang=tv.lang||LANG.code;}
      speechSynthesis.speak(u);
    }}catch(e){}
    loadVoices(); warmVoices();
  }
  ['pointerdown','touchstart','keydown','click'].forEach(function(ev){
    document.addEventListener(ev,unlock,{once:false,passive:true});
  });
  setInterval(function(){ try{ if('speechSynthesis'in window && speechSynthesis.speaking){speechSynthesis.resume()} }catch(e){} },8000);
})();
/* PWA: register service worker for offline use */
if('serviceWorker'in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('service-worker.js').catch(function(){})})}
</script>
