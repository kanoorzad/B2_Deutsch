name: TEST Persian audio (diagnostic, 1 shard)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Diagnostic run — ONE shard, small slice, verbose
        env:
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          JOBS_CSV: audio_jobs_fa.csv
          SHARD_INDEX: '0'
          SHARD_TOTAL: '840'   # ~10 clips only, just to prove Azure works
          PYTHONUNBUFFERED: '1'
        run: python -u generate_audio_azure.py
