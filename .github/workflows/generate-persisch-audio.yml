name: Generate Persisch Audio Pack

on:
workflow_dispatch:
inputs:
limit:
description: "First test: use 50. Full run: leave empty."
required: false
default: "50"
force:
description: "Regenerate files even if MP3 exists"
required: false
default: "false"
type: choice
options:
- "false"
- "true"

permissions:
contents: write

concurrency:
group: persisch-audio-generation
cancel-in-progress: false

jobs:
generate-persisch-audio:
name: Generate Persisch Audio
runs-on: ubuntu-latest
timeout-minutes: 360

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Verify required files
    run: |
      test -f persian_audio_jobs.csv
      test -f generate_persian_audio_azure.py
      mkdir -p audio/fa

  - name: Generate Persisch MP3 files
    env:
      AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
      AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
      AZURE_SPEECH_VOICE: ${{ secrets.AZURE_SPEECH_VOICE }}
      AZURE_OUTPUT_FORMAT: audio-24khz-160kbitrate-mono-mp3
      AUDIO_GENERATION_LIMIT: ${{ github.event.inputs.limit }}
      AUDIO_GENERATION_FORCE: ${{ github.event.inputs.force }}
    run: |
      python generate_persian_audio_azure.py

  - name: Check generated MP3 files
    run: |
      MP3_COUNT=$(find audio/fa -name "*.mp3" | wc -l)
      echo "MP3 count: $MP3_COUNT"
      head -40 audio-manifest.js

      if [ "$MP3_COUNT" -eq 0 ]; then
        echo "::error::No MP3 files were generated. Check Azure key, region, or voice in the previous step."
        exit 1
      fi

  - name: Commit generated audio pack
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      git add audio/fa audio-manifest.js

      if git diff --cached --quiet; then
        echo "No audio changes to commit."
      else
        git commit -m "Generate Persisch audio pack"
        git push
      fi
```
