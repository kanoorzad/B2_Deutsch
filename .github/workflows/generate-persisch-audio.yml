name: Generate Persisch Audio Pack

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional number of rows to generate first, e.g. 50 for testing; leave empty for all"
        required: false
        default: ""
      force:
        description: "Regenerate files even if MP3 exists"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: persisch-audio-generation
  cancel-in-progress: false

jobs:
  generate-persisch-audio:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify required files
        run: |
          test -f persian_audio_jobs.csv
          test -f tools/generate_persian_audio_azure.py
          mkdir -p audio/fa

      - name: Generate Persisch MP3 files with Azure Neural TTS
        env:
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          AZURE_SPEECH_VOICE: ${{ secrets.AZURE_SPEECH_VOICE || 'fa-IR-DilaraNeural' }}
          AZURE_OUTPUT_FORMAT: audio-24khz-160kbitrate-mono-mp3
          AUDIO_GENERATION_LIMIT: ${{ github.event.inputs.limit }}
          AUDIO_GENERATION_FORCE: ${{ github.event.inputs.force }}
        run: |
          python generate_persian_audio_azure.py

      - name: Show generated file count
        run: |
          echo "MP3 count:"
          find audio/fa -name "*.mp3" | wc -l
          echo "Manifest:"
          head -40 audio-manifest.js

      - name: Commit generated audio pack
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate Persisch audio pack"
          file_pattern: "audio/fa/*.mp3 audio-manifest.js"
