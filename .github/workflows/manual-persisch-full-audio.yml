name: Manual Persisch Full Audio

on: workflow_dispatch

permissions:
  contents: write

jobs:
  build-audio:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify files
        run: |
          test -f persian_audio_jobs.csv
          test -f generate_persian_audio_azure.py
          mkdir -p audio/fa

      - name: Generate all missing audio
        env:
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          AZURE_SPEECH_VOICE: fa-IR-DilaraNeural
          AZURE_OUTPUT_FORMAT: audio-24khz-160kbitrate-mono-mp3
          AUDIO_GENERATION_LIMIT: ""
          AUDIO_GENERATION_FORCE: "false"
        run: python generate_persian_audio_azure.py

      - name: Commit audio
        run: |
          echo "MP3 count:"
          find audio/fa -name "*.mp3" | wc -l
          head -30 audio-manifest.js

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audio/fa audio-manifest.js

          if git diff --cached --quiet; then
            echo "No new audio files to commit."
          else
            git commit -m "Generate full Persisch audio"
            git push
          fi
