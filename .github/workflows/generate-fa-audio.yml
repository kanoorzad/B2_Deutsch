name: Build Persian audio pack

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-fa-audio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate Persian audio
        env:
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          JOBS_CSV: audio_jobs_fa.csv
        run: python generate_audio_azure.py

      - name: Commit new audio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio
          if git diff --cached --quiet; then
            echo "No new audio to commit."
          else
            git commit -m "Add Persian audio clips"
            git push
          fi
