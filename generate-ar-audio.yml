name: Build Arabic audio pack

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: audio-ar
  cancel-in-progress: false

jobs:
  build-ar-audio:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate Arabic audio
        env:
          AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          JOBS_CSV: audio_jobs_ar.csv
        run: python generate_audio_azure.py

      - name: Commit and push new audio
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audio
          if git diff --cached --quiet; then
            echo "No new audio to commit."
            exit 0
          fi
          git commit -m "Add Arabic audio clips"
          # main may have moved during the long run: rebase our commit on top and retry
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "push attempt $i failed, retrying..."
            sleep 5
          done
          echo "push failed after retries"
          exit 1
